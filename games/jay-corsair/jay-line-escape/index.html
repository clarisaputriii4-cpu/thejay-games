<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Jay Line Escape</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:#070014;font-family:Arial,sans-serif;touch-action:none;user-select:none}
canvas{display:block;width:100vw;height:100vh;background:#070014}
#menu{position:fixed;inset:0;background:rgba(7,0,22,.78);display:flex;align-items:center;justify-content:center;z-index:10}
.card{width:min(92vw,470px);padding:24px;border-radius:24px;text-align:center;color:white;background:linear-gradient(180deg,#3a007a,#10002d);border:2px solid #b84cff;box-shadow:0 0 35px rgba(184,76,255,.45)}
h1{font-size:42px;margin-bottom:12px;text-shadow:0 0 22px #b84cff}
p{color:#dfcaff;line-height:1.5;margin:12px 0 20px}
button{border:0;border-radius:999px;padding:14px 28px;font-weight:900;font-size:16px;color:#230038;background:linear-gradient(90deg,#ffd83d,#b84cff,#45e9ff)}
#hint{position:fixed;left:50%;bottom:15px;transform:translateX(-50%);color:#ead8ff;background:rgba(35,0,75,.6);border:1px solid rgba(184,76,255,.65);border-radius:999px;padding:9px 14px;font-size:12px;pointer-events:none}
</style>
</head>
<body>
<canvas id="game"></canvas>
<div id="menu">
  <div class="card">
    <h1>💠 JAY LINE ESCAPE</h1>
    <p>Tap to switch lanes. Collect JAY coins, avoid red firewall blocks, and enjoy simple arcade sound effects.</p>
    <button id="start">START GAME</button>
  </div>
</div>
<div id="hint">TAP TO SWITCH LANE</div>

<script>
const canvas=document.getElementById("game"),ctx=canvas.getContext("2d");
const menu=document.getElementById("menu"),startBtn=document.getElementById("start");

let w,h,run=false,frame=0,score=0,lives=3,best=Number(localStorage.getItem("jay_line_best_sound")||0);
let lane=1,lanes=[],speed=4,items=[],stars=[],parts=[];
let audioCtx=null,soundReady=false;

function initAudio(){
  if(!audioCtx) audioCtx=new (window.AudioContext||window.webkitAudioContext)();
  if(audioCtx.state==="suspended") audioCtx.resume();
  soundReady=true;
}
function beep(freq=600,dur=.12,type="sine",vol=.055){
  if(!soundReady||!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.type=type;o.frequency.value=freq;
  o.connect(g);g.connect(audioCtx.destination);
  g.gain.setValueAtTime(vol,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(.0001,audioCtx.currentTime+dur);
  o.start();o.stop(audioCtx.currentTime+dur);
}
function coinSound(){beep(900,.08,"triangle",.06);setTimeout(()=>beep(1250,.08,"triangle",.045),60)}
function damageSound(){beep(180,.18,"sawtooth",.07)}
function switchSound(){beep(520,.055,"square",.035)}
function gameOverSound(){beep(320,.14,"sawtooth",.06);setTimeout(()=>beep(220,.18,"sawtooth",.055),130);setTimeout(()=>beep(130,.22,"sawtooth",.05),290)}

function rand(a,b){return Math.random()*(b-a)+a}
function resize(){
  w=innerWidth;h=innerHeight;canvas.width=w;canvas.height=h;
  lanes=[w*.25,w*.5,w*.75];
  stars=[];for(let i=0;i<100;i++)stars.push({x:rand(0,w),y:rand(0,h),r:rand(.5,2),s:rand(.1,.55)});
}
function reset(){
  initAudio();
  run=true;frame=0;score=0;lives=3;speed=4;lane=1;items=[];parts=[];
  menu.style.display="none";
  beep(760,.1,"triangle",.04);
}
startBtn.onclick=reset;

function switchLane(dir){
  if(!run)return;
  if(dir==="left")lane=Math.max(0,lane-1);
  else if(dir==="right")lane=Math.min(2,lane+1);
  else lane=(lane+1)%3;
  switchSound();
}

addEventListener("pointerdown",e=>{
  if(e.target===startBtn)return;
  initAudio();
  switchLane();
});
addEventListener("keydown",e=>{
  if(!run)return;
  if(e.key==="ArrowLeft")switchLane("left");
  if(e.key==="ArrowRight")switchLane("right");
  if(e.code==="Space"){e.preventDefault();switchLane()}
});

function spawn(){
  const type=Math.random()<.7?"coin":"block";
  items.push({lane:Math.floor(rand(0,3)),y:-40,type,r:type==="coin"?16:22});
}
function burst(x,y,c,n){for(let i=0;i<n;i++)parts.push({x,y,vx:rand(-3,3),vy:rand(-3,3),r:rand(2,5),life:rand(18,35),c})}

function bg(){
  let g=ctx.createRadialGradient(w/2,h/2,20,w/2,h/2,Math.max(w,h));
  g.addColorStop(0,"#32006d");g.addColorStop(.5,"#16003a");g.addColorStop(1,"#05000f");
  ctx.fillStyle=g;ctx.fillRect(0,0,w,h);
  stars.forEach(s=>{s.y+=s.s+speed*.05;if(s.y>h)s.y=0;ctx.fillStyle="rgba(255,255,255,.5)";ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill()});
  lanes.forEach(x=>{ctx.strokeStyle="rgba(69,233,255,.25)";ctx.lineWidth=4;ctx.beginPath();ctx.moveTo(x,90);ctx.lineTo(x,h);ctx.stroke()});
}

function player(){
  const x=lanes[lane],y=h-105;
  ctx.shadowColor="#b84cff";ctx.shadowBlur=22;
  ctx.fillStyle="#7d28ff";ctx.beginPath();ctx.arc(x,y,31,0,Math.PI*2);ctx.fill();
  ctx.shadowBlur=0;ctx.fillStyle="#12002e";ctx.beginPath();ctx.arc(x,y,22,0,Math.PI*2);ctx.fill();
  ctx.fillStyle="#fff";ctx.font="900 27px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("J",x,y+2);
}

function drawItem(it){
  const x=lanes[it.lane],y=it.y;
  if(it.type==="coin"){
    ctx.shadowColor="#ffd83d";ctx.shadowBlur=15;ctx.fillStyle="#ffd83d";
    ctx.beginPath();ctx.arc(x,y,it.r,0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;ctx.strokeStyle="#ff9d00";ctx.lineWidth=4;ctx.stroke();
    ctx.fillStyle="#704400";ctx.font="900 16px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("J",x,y+1);
  }else{
    ctx.shadowColor="#ff3d77";ctx.shadowBlur=15;ctx.fillStyle="#ff3d77";
    ctx.fillRect(x-24,y-24,48,48);ctx.shadowBlur=0;
    ctx.fillStyle="#fff";ctx.font="900 20px Arial";ctx.textAlign="center";ctx.textBaseline="middle";ctx.fillText("!",x,y+1);
  }
}

function hud(){
  ctx.fillStyle="#fff";ctx.font="900 24px Arial";ctx.textAlign="left";ctx.shadowColor="#b84cff";ctx.shadowBlur=12;
  ctx.fillText("SCORE "+score,22,42);ctx.fillStyle="#ff6aa2";ctx.fillText("❤ "+lives,22,74);
  ctx.textAlign="right";ctx.fillStyle="#45e9ff";ctx.fillText("BEST "+best,w-22,42);ctx.shadowBlur=0;
}
function drawParts(){parts.forEach(p=>{ctx.globalAlpha=Math.max(0,p.life/35);ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1})}

function update(){
  frame++;speed+=.002;
  if(frame%Math.max(26,60-Math.floor(score/80))===0)spawn();
  items.forEach(it=>it.y+=speed);
  items=items.filter(it=>{
    if(it.y>h-140&&it.y<h-70&&it.lane===lane){
      const x=lanes[it.lane];
      if(it.type==="coin"){
        score+=10;coinSound();burst(x,it.y,"#ffd83d",18);
        if(score>best){best=score;localStorage.setItem("jay_line_best_sound",best)}
      }else{
        lives--;damageSound();burst(x,it.y,"#ff3d77",25);
        if(lives<=0)gameOver();
      }
      return false;
    }
    if(it.y>h+50)return false;
    return true;
  });
  parts.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.life--;p.vx*=.97;p.vy*=.97});
  parts=parts.filter(p=>p.life>0);
}
function gameOver(){
  run=false;gameOverSound();
  menu.style.display="flex";
  menu.innerHTML='<div class="card"><h1>GAME OVER</h1><p>Score: <b>'+score+'</b><br>Best: <b>'+best+'</b></p><button onclick="location.reload()">PLAY AGAIN</button></div>';
}
function loop(){bg();items.forEach(drawItem);player();drawParts();hud();if(run)update();else frame++;requestAnimationFrame(loop)}
addEventListener("resize",resize);resize();loop();
</script>
</body>
</html>
